<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cliko — Support</title>
  <meta name="description" content="Need help with cliko? Write directly to the developer." />
  <link rel="icon" type="image/svg+xml" href="/cliko/about/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #030712;
      --bg-surface: #0b1220;
      --primary: #3B82F6;
      --primary-dark: #2563EB;
      --fg: #F9FAFB;
      --fg-muted: #9CA3AF;
      --fg-dim: #6B7280;
      --border: #1F2937;
      --border-light: #374151;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      letter-spacing: -0.01em;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    /* Subtle radial glow */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(600px circle at 50% 40%, rgba(59,130,246,0.10), transparent 55%);
      pointer-events: none;
    }

    header {
      padding: 24px 32px;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; letter-spacing: -0.03em;
    }
    .brand .mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
    }

    main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px;
      text-align: center;
    }
    .eyebrow {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.04;
      margin-bottom: 20px;
    }
    .lede {
      font-size: 18px; font-weight: 500;
      color: var(--fg-muted);
      line-height: 1.55;
      max-width: 460px;
      margin-bottom: 40px;
    }

    .email-btn {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 20px 32px;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 18px; font-weight: 700; letter-spacing: 0.01em;
      box-shadow: 0 10px 40px rgba(59,130,246,0.3);
      transition: background 160ms, transform 120ms;
    }
    .email-btn:hover { background: var(--primary-dark); }
    .email-btn:active { transform: translateY(1px); }
    .email-btn svg { flex-shrink: 0; }

    .hint {
      margin-top: 22px;
      font-size: 13px;
      color: var(--fg-dim);
    }

    footer {
      padding: 24px 32px;
      display: flex; justify-content: center;
    }
    footer a {
      font-size: 13px; font-weight: 500;
      color: var(--fg-dim);
      transition: color 160ms;
    }
    footer a:hover { color: var(--fg); }
  </style>
</head>
<body>

  <header>
    <a href="/cliko/about/" class="brand">
      <span class="mark">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <polyline points="5.6,4.76 14.24,10 5.6,15.24" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      cliko
    </a>
  </header>

  <main>
    <div class="eyebrow">Support</div>
    <h1>
      You write.<br />
      We fix it.
    </h1>
    <p class="lede">
      No forms. No ticket queues. Your email lands directly in the developer's inbox.
    </p>

    <a class="email-btn" href="mailto:v@vinicius.pm?subject=cliko%20support">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-10 6L2 7"/>
      </svg>
      v@vinicius.pm
    </a>

    <div class="hint">We usually reply within a day.</div>
  </main>

  <footer>
    <a href="/cliko/about/">← Back to cliko</a>
  </footer>

</body>
</html>
